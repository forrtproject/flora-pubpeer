<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RepNote</title>
  <link rel="icon" type="image/svg+xml" href="https://forrt.org/images/logo.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg:      #fefdf6;
      --text:    #1a1a1a;
      --muted:   #444;
      --link:    #1a4f7a;
      --border:  #dedad0;
      --code-bg: #f2f0e6;
      --serif:   "Century Schoolbook", "New Century Schoolbook",
                 "Century Schoolbook L", "Book Antiqua", Palatino,
                 Georgia, "Times New Roman", serif;
      --mono:    "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --topbar:  56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { background: var(--bg); min-height: 100%; }

    body {
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.72;
      color: var(--text);
      padding-top: var(--topbar);
    }

    /* ── Fixed black top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar);
      background: #3d3d3d;
      z-index: 9999;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 14px;
    }

    #topbar a.logo-link {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      text-decoration: none;
    }

    #topbar a.logo-link img {
      height: 28px;
      width: auto;
      display: block;
      margin: 0;

    }

    #topbar .divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    #topbar a.site-title {
      font-family: var(--serif);
      font-size: 1.05em;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    #topbar a.site-title:hover { color: #ddd; }

    #content {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 28px 80px;
    }

    h1 { font-size: 2.5em;  margin: 0.5em 0 0.45em; font-weight: 700; line-height: 1.2; }
    h2 { font-size: 1.55em; margin: 1.8em 0 0.4em;  font-weight: 700; }
    h3 { font-size: 1.2em;  margin: 1.5em 0 0.35em; font-weight: 700; }
    h4 { font-size: 1.05em; margin: 1.3em 0 0.3em;  font-weight: 700; }

    p { margin-bottom: 1em; }

    a { color: var(--link); text-decoration: underline; text-underline-offset: 2px; }
    a:hover { color: #0d2f4a; }

    ul, ol { padding-left: 1.5em; margin-bottom: 1em; }
    li { margin-bottom: 0.3em; }

    hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    blockquote {
      border-left: 3px solid #b8b090;
      padding: 0.3em 1em;
      color: var(--muted);
      margin: 0 0 1em;
    }

    code {
      font-family: var(--mono);
      font-size: 0.86em;
      background: var(--code-bg);
      border-radius: 3px;
      padding: 0.12em 0.38em;
    }

    pre {
      font-family: var(--mono);
      font-size: 0.86em;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1em 1.2em;
      overflow-x: auto;
      margin-bottom: 1.2em;
    }
    pre code { background: none; padding: 0; }

    table { border-collapse: collapse; width: 100%; margin-bottom: 1.4em; }
    th, td { border: 1px solid var(--border); padding: 0.5em 0.85em; text-align: left; }
    th { background: var(--code-bg); font-weight: 700; }

    img { max-width: 100%; height: auto; display: block; margin: 1em 0; }

    details { margin-bottom: 0.4em; }
    summary {
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      padding: 0.1em 0;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: '▶  '; font-size: 0.75em; }
    details[open] summary::before { content: '▼  '; }

    @media (max-width: 600px) {
      #content { padding: 32px 16px 60px; }
      h1 { font-size: 1.9em; }
      body { font-size: 16px; }
    }
  </style>
</head>
<body>
  <nav id="topbar">
    <a class="logo-link" href="https://forrt.org" target="_blank" rel="noopener" aria-label="FORRT">
      <img src="https://forrt.org/images/logo.svg" alt="FORRT logo" />
    </a>
    <div class="divider"></div>
    <a class="site-title" href="https://forrt.org/flora-pubpeer/">RepNote</a>
  </nav>
  <div id="content">Loading…</div>
  <script>
    fetch('README.md')
      .then(r => {
        if (!r.ok) throw new Error('Could not load README.md');
        return r.text();
      })
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p style="color:red">Could not load README.md: ' + err.message + '</p>';
      });
  </script>
</body>
</html>
